x-postgres: &postgres
  image: postgres:${POSTGRES_TAG:-16}
  restart: always
  shm_size: 128mb
  networks:
    - servarr
  environment: &postgres_env
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  healthcheck: &postgres_health
    interval: 5s
    timeout: 5s
    retries: 10
    start_period: 10s

x-arr: &arr
  restart: unless-stopped
  networks:
    - servarr
  environment: &arr_env
    PUID: ${PUID:-1000}
    PGID: ${PGID:-1000}
    TZ: ${TZ}

x-svc: &svc
  restart: unless-stopped
  networks:
    - servarr

x-vpn: &vpn
  image: qmcgaw/gluetun:${VPN_TAG:-v3.40}
  cap_add:
    - NET_ADMIN
  restart: unless-stopped
  networks:
    - servarr
  environment: &vpn_env
    VPN_SERVICE_PROVIDER: private internet access
    VPN_TYPE: openvpn
    OPENVPN_USER: ${OPENVPN_USER}
    OPENVPN_PASSWORD: ${OPENVPN_PASSWORD}
    OPENVPN_PROTOCOL: udp
    TZ: ${TZ}

x-vpn-pf: &vpn_pf
  VPN_PORT_FORWARDING: "on"
  PORT_FORWARD_ONLY: "true"
  DNS_UPSTREAM_RESOLVER_TYPE: plain
  DNS_UPSTREAM_PLAIN_ADDRESSES: 1.1.1.1:53,9.9.9.9:53
  VPN_PORT_FORWARDING_UP_COMMAND: "/bin/sh -c 'wget -O- -nv --post-data \"json={\\\"listen_port\\\":{{PORT}},\\\"random_port\\\":false,\\\"upnp\\\":false}\" http://127.0.0.1:8080/api/v2/app/setPreferences'"
  VPN_PORT_FORWARDING_DOWN_COMMAND: "/bin/sh -c 'wget -O- -nv --post-data \"json={\\\"listen_port\\\":0}\" http://127.0.0.1:8080/api/v2/app/setPreferences'"

x-qbit: &qbit
  image: lscr.io/linuxserver/qbittorrent:${QBITTORRENT_TAG:-5.1.4}
  restart: unless-stopped
  environment:
    PUID: ${PUID:-1000}
    PGID: ${PGID:-1000}
    TZ: ${TZ}
    WEBUI_PORT: "8080"
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8080"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 30s

services:
  radarr_db:
    <<: *postgres
    container_name: ${RADARR_DB_CNTNR:-radarr-db}
    environment:
      <<: *postgres_env
      POSTGRES_USER: ${RADARR_DB_USER:-radarr}
      POSTGRES_DB: ${RADARR_DB_MAIN:-radarr-main}
      POSTGRES_EXTRA_DBS: ${RADARR_DB_LOG:-radarr-log}
    healthcheck:
      <<: *postgres_health
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${RADARR_DB_USER:-radarr} -d ${RADARR_DB_MAIN:-radarr-main}",
        ]
    ports:
      - "${RADARR_DB_PORT:-5432}:5432/tcp"
    volumes:
      - ${CNFG_DIR:-/home/administrator}/postgres/init-extra-dbs.sh:/docker-entrypoint-initdb.d/10-extra-dbs.sh:ro
      - ${CNFG_DIR:-/home/administrator}/radarr_db:/var/lib/postgresql/data

  sonarr_db:
    <<: *postgres
    container_name: ${SONARR_DB_CNTNR:-sonarr-db}
    environment:
      <<: *postgres_env
      POSTGRES_USER: ${SONARR_DB_USER:-sonarr}
      POSTGRES_DB: ${SONARR_DB_MAIN:-sonarr-main}
      POSTGRES_EXTRA_DBS: ${SONARR_DB_LOG:-sonarr-log}
    healthcheck:
      <<: *postgres_health
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${SONARR_DB_USER:-sonarr} -d ${SONARR_DB_MAIN:-sonarr-main}",
        ]
    ports:
      - "${SONARR_DB_PORT:-5433}:5432/tcp"
    volumes:
      - ${CNFG_DIR:-/home/administrator}/postgres/init-extra-dbs.sh:/docker-entrypoint-initdb.d/10-extra-dbs.sh:ro
      - ${CNFG_DIR:-/home/administrator}/sonarr_db:/var/lib/postgresql/data

  prowlarr_db:
    <<: *postgres
    container_name: ${PROWLARR_DB_CNTNR:-prowlarr-db}
    environment:
      <<: *postgres_env
      POSTGRES_USER: ${PROWLARR_DB_USER:-prowlarr}
      POSTGRES_DB: ${PROWLARR_DB_MAIN:-prowlarr-main}
      POSTGRES_EXTRA_DBS: ${PROWLARR_DB_LOG:-prowlarr-log}
    healthcheck:
      <<: *postgres_health
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${PROWLARR_DB_USER:-prowlarr} -d ${PROWLARR_DB_MAIN:-prowlarr-main}",
        ]
    ports:
      - "${PROWLARR_DB_PORT:-5434}:5432/tcp"
    volumes:
      - ${CNFG_DIR:-/home/administrator}/postgres/init-extra-dbs.sh:/docker-entrypoint-initdb.d/10-extra-dbs.sh:ro
      - ${CNFG_DIR:-/home/administrator}/prowlarr_db:/var/lib/postgresql/data

  seerr_db:
    <<: *postgres
    container_name: ${SEERR_DB_CNTNR:-seerr-db}
    environment:
      <<: *postgres_env
      POSTGRES_USER: ${SEERR_DB_USER:-seerr}
      POSTGRES_DB: ${SEERR_DB:-seerr}
    healthcheck:
      <<: *postgres_health
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${SEERR_DB_USER:-seerr} -d ${SEERR_DB:-seerr}",
        ]
    ports:
      - "${SEERR_DB_PORT:-5435}:5432/tcp"
    volumes:
      - ${CNFG_DIR:-/home/administrator}/seerr_db:/var/lib/postgresql/data

  pgadmin:
    <<: *svc
    image: dpage/pgadmin4:${PGADMIN_TAG:-9.16}
    container_name: ${PGADMIN_CNTNR:-pgadmin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - ${CNFG_DIR:-/home/administrator}/pgadmin/data:/var/lib/pgadmin
      - ${CNFG_DIR:-/home/administrator}/pgadmin/servers.json:/pgadmin4/servers.json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/misc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      radarr_db:
        condition: service_healthy
      sonarr_db:
        condition: service_healthy
      prowlarr_db:
        condition: service_healthy
      seerr_db:
        condition: service_healthy

  vpn-qbit-1:
    <<: *vpn
    container_name: ${VPN_QBIT1_CNTNR:-vpn-qbit-1}
    environment:
      <<: [*vpn_env, *vpn_pf]
      SERVER_REGIONS: Austria,Czech Republic
    ports:
      - "${QBIT1_WEBUI_PORT:-8081}:8080"
    volumes:
      - ${CNFG_DIR:-/home/administrator}/vpn/qbit-1:/gluetun

  vpn-qbit-2:
    <<: *vpn
    container_name: ${VPN_QBIT2_CNTNR:-vpn-qbit-2}
    environment:
      <<: [*vpn_env, *vpn_pf]
      SERVER_REGIONS: Hungary,Switzerland
    ports:
      - "${QBIT2_WEBUI_PORT:-8082}:8080"
    volumes:
      - ${CNFG_DIR:-/home/administrator}/vpn/qbit-2:/gluetun

  vpn-qbit-3:
    <<: *vpn
    container_name: ${VPN_QBIT3_CNTNR:-vpn-qbit-3}
    environment:
      <<: [*vpn_env, *vpn_pf]
      SERVER_REGIONS: DE Frankfurt,IT Milano
    ports:
      - "${QBIT3_WEBUI_PORT:-8083}:8080"
    volumes:
      - ${CNFG_DIR:-/home/administrator}/vpn/qbit-3:/gluetun

  vpn-qbit-4:
    <<: *vpn
    container_name: ${VPN_QBIT4_CNTNR:-vpn-qbit-4}
    environment:
      <<: [*vpn_env, *vpn_pf]
      SERVER_REGIONS: Croatia,France
    ports:
      - "${QBIT4_WEBUI_PORT:-8084}:8080"
    volumes:
      - ${CNFG_DIR:-/home/administrator}/vpn/qbit-4:/gluetun

  vpn-arr:
    <<: *vpn
    container_name: ${VPN_ARR_CNTNR:-vpn-arr}
    environment:
      <<: *vpn_env
      SERVER_REGIONS: Austria
      DNS_KEEP_NAMESERVER: "on"
      FIREWALL_OUTBOUND_SUBNETS: ${DOCKER_SUBNET}
    ports:
      - "${RADARR_PORT:-7878}:7878"
      - "${SONARR_PORT:-8989}:8989"
      - "${PROWLARR_PORT:-9696}:9696"
    volumes:
      - ${CNFG_DIR:-/home/administrator}/vpn/arr:/gluetun

  alpha:
    <<: *qbit
    container_name: ${QBIT_ALPHA_CNTNR:-alpha}
    network_mode: "service:vpn-qbit-1"
    volumes:
      - ${CNFG_DIR:-/home/administrator}/qbittorrent/config:/config
      - ${MNT_DIR:-/home/administrator/downloads}/torrents:/data/torrents
    deploy:
      resources:
        limits:
          memory: ${QB_MEMORY_LIMIT:-4096M}
    depends_on:
      vpn-qbit-1:
        condition: service_healthy

  bravo:
    <<: *qbit
    container_name: ${QBIT_BRAVO_CNTNR:-bravo}
    network_mode: "service:vpn-qbit-2"
    volumes:
      - ${CNFG_DIR:-/home/administrator}/qbittorrent-bravo/config:/config
      - ${MNT_DIR:-/home/administrator/downloads}/torrents:/data/torrents
    depends_on:
      vpn-qbit-2:
        condition: service_healthy

  charlie:
    <<: *qbit
    container_name: ${QBIT_CHARLIE_CNTNR:-charlie}
    network_mode: "service:vpn-qbit-3"
    volumes:
      - ${CNFG_DIR:-/home/administrator}/qbittorrent-charlie/config:/config
      - ${MNT_DIR:-/home/administrator/downloads}/torrents:/data/torrents
    depends_on:
      vpn-qbit-3:
        condition: service_healthy

  delta:
    <<: *qbit
    container_name: ${QBIT_DELTA_CNTNR:-delta}
    network_mode: "service:vpn-qbit-4"
    volumes:
      - ${CNFG_DIR:-/home/administrator}/qbittorrent-delta/config:/config
      - ${MNT_DIR:-/home/administrator/downloads}/torrents:/data/torrents
    depends_on:
      vpn-qbit-4:
        condition: service_healthy

  qui:
    <<: *svc
    image: ghcr.io/autobrr/qui:${QUI_TAG:-latest}
    container_name: ${QUI_CNTNR:-qui}
    ports:
      - "${QUI_PORT:-7476}:7476"
    environment:
      TZ: ${TZ}
      QUI__HOST: 0.0.0.0
      QUI__PORT: "7476"
    volumes:
      - ${CNFG_DIR:-/home/administrator}/qui/config:/config

  flaresolverr:
    <<: *svc
    image: flaresolverr/flaresolverr:${FLARESOLVERR_TAG:-v3.5.0}
    container_name: ${FLARESOLVERR_CNTNR:-flaresolverr}
    ports:
      - "${FLARESOLVERR_PORT:-8191}:8191"
    environment:
      LOG_LEVEL: ${FS_LOG_LEVEL:-info}
      LOG_HTML: ${FS_LOG_HTML:-false}
      CAPTCHA_SOLVER: ${FS_CAPTCHA_SOLVER:-none}
      TZ: ${TZ}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:${PROWLARR_TAG:-2.4.0}
    container_name: ${PROWLARR_CNTNR:-prowlarr}
    restart: unless-stopped
    network_mode: "service:vpn-arr"
    environment:
      <<: *arr_env
      PROWLARR__POSTGRES__HOST: ${PROWLARR_DB_CNTNR:-prowlarr-db}
      PROWLARR__POSTGRES__PORT: "5432"
      PROWLARR__POSTGRES__USER: ${PROWLARR_DB_USER:-prowlarr}
      PROWLARR__POSTGRES__PASSWORD: ${POSTGRES_PASSWORD}
      PROWLARR__POSTGRES__MAINDB: ${PROWLARR_DB_MAIN:-prowlarr-main}
      PROWLARR__POSTGRES__LOGDB: ${PROWLARR_DB_LOG:-prowlarr-log}
    volumes:
      - ${CNFG_DIR:-/home/administrator}/prowlarr/config:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      prowlarr_db:
        condition: service_healthy
      vpn-arr:
        condition: service_healthy

  radarr:
    image: lscr.io/linuxserver/radarr:${RADARR_TAG:-6.2.1}
    container_name: ${RADARR_CNTNR:-radarr}
    restart: unless-stopped
    network_mode: "service:vpn-arr"
    environment:
      <<: *arr_env
      RADARR__POSTGRES__HOST: ${RADARR_DB_CNTNR:-radarr-db}
      RADARR__POSTGRES__PORT: "5432"
      RADARR__POSTGRES__USER: ${RADARR_DB_USER:-radarr}
      RADARR__POSTGRES__PASSWORD: ${POSTGRES_PASSWORD}
      RADARR__POSTGRES__MAINDB: ${RADARR_DB_MAIN:-radarr-main}
      RADARR__POSTGRES__LOGDB: ${RADARR_DB_LOG:-radarr-log}
    volumes:
      - ${CNFG_DIR:-/home/administrator}/radarr/config:/config
      - ${MNT_DIR:-/home/administrator/downloads}:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      radarr_db:
        condition: service_healthy
      vpn-arr:
        condition: service_healthy

  sonarr:
    image: lscr.io/linuxserver/sonarr:${SONARR_TAG:-4.0.17}
    container_name: ${SONARR_CNTNR:-sonarr}
    restart: unless-stopped
    network_mode: "service:vpn-arr"
    environment:
      <<: *arr_env
      SONARR__POSTGRES__HOST: ${SONARR_DB_CNTNR:-sonarr-db}
      SONARR__POSTGRES__PORT: "5432"
      SONARR__POSTGRES__USER: ${SONARR_DB_USER:-sonarr}
      SONARR__POSTGRES__PASSWORD: ${POSTGRES_PASSWORD}
      SONARR__POSTGRES__MAINDB: ${SONARR_DB_MAIN:-sonarr-main}
      SONARR__POSTGRES__LOGDB: ${SONARR_DB_LOG:-sonarr-log}
    volumes:
      - ${CNFG_DIR:-/home/administrator}/sonarr/config:/config
      - ${MNT_DIR:-/home/administrator/downloads}:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      sonarr_db:
        condition: service_healthy
      vpn-arr:
        condition: service_healthy

  seerr:
    <<: *svc
    image: ghcr.io/seerr-team/seerr:${SEERR_TAG:-v3.3.0}
    container_name: ${SEERR_CNTNR:-seerr}
    init: true
    ports:
      - "${SEERR_PORT:-5055}:5055"
    environment:
      LOG_LEVEL: ${SR_LOG_LEVEL:-info}
      TZ: ${TZ}
      PORT: "5055"
      DB_TYPE: postgres
      DB_HOST: ${SEERR_DB_CNTNR:-seerr-db}
      DB_PORT: "5432"
      DB_USER: ${SEERR_DB_USER:-seerr}
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${SEERR_DB:-seerr}
      DB_POOL_SIZE: "10"
      DB_LOG_QUERIES: "false"
    volumes:
      - ${CNFG_DIR:-/home/administrator}/seerr/config:/app/config
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1",
        ]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s
    depends_on:
      seerr_db:
        condition: service_healthy

networks:
  servarr:
    external: true

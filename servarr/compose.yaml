x-postgres: &postgres
  image: postgres:${POSTGRES_TAG-16}
  restart: always
  networks:
    - servarr
  environment: &postgres_env
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  healthcheck: &postgres_health
    interval: 5s
    timeout: 5s
    retries: 10

x-arr: &arr
  restart: unless-stopped
  networks:
    - servarr
  environment: &arr_env
    - PUID=1000
    - PGID=1000
    - TZ=${TZ}

services:
  radarr_db:
    <<: *postgres
    container_name: ${RADARR_DB_CNTNR:-radarr-db}
    ports:
      - "${RADARR_DB_PORT:-5431}:5432/tcp"
    environment:
      <<: *postgres_env
      POSTGRES_DB: ${RADARR_DB}
      POSTGRES_USER: ${RADARR_DB_USER}
    healthcheck:
      <<: *postgres_health
      test: ["CMD-SHELL", "pg_isready -U ${RADARR_DB_USER} -d ${RADARR_DB}"]
    volumes:
      - ${CNFG_DIR:-/home/administrator}/radarr_db:/var/lib/postgresql/data

  radarr_db_log:
    <<: *postgres
    container_name: ${RADARR_DB_CNTNR_LOG:-radarr-db-log}
    ports:
      - "${RADARR_DB_PORT_LOG:-5432}:5432/tcp"
    environment:
      <<: *postgres_env
      POSTGRES_DB: ${RADARR_DB_LOG}
      POSTGRES_USER: ${RADARR_DB_USER}
    healthcheck:
      <<: *postgres_health
      test: ["CMD-SHELL", "pg_isready -U ${RADARR_DB_USER} -d ${RADARR_DB_LOG}"]
    volumes:
      - ${CNFG_DIR:-/home/administrator}/radarr_db_log:/var/lib/postgresql/data

  sonarr_db:
    <<: *postgres
    container_name: ${SONARR_DB_CNTNR:-sonarr-db}
    ports:
      - "${SONARR_DB_PORT:-5433}:5432/tcp"
    environment:
      <<: *postgres_env
      POSTGRES_DB: ${SONARR_DB}
      POSTGRES_USER: ${SONARR_DB_USER}
    healthcheck:
      <<: *postgres_health
      test: ["CMD-SHELL", "pg_isready -U ${SONARR_DB_USER} -d ${SONARR_DB}"]
    volumes:
      - ${CNFG_DIR:-/home/administrator}/sonarr_db:/var/lib/postgresql/data

  sonarr_db_log:
    <<: *postgres
    container_name: ${SONARR_DB_CNTNR_LOG:-sonarr-db-log}
    ports:
      - "${SONARR_DB_PORT_LOG:-5434}:5432/tcp"
    environment:
      <<: *postgres_env
      POSTGRES_DB: ${SONARR_DB_LOG}
      POSTGRES_USER: ${SONARR_DB_USER}
    healthcheck:
      <<: *postgres_health
      test: ["CMD-SHELL", "pg_isready -U ${SONARR_DB_USER} -d ${SONARR_DB_LOG}"]
    volumes:
      - ${CNFG_DIR:-/home/administrator}/sonarr_db_log:/var/lib/postgresql/data

  sseerr_db:
    <<: *postgres
    container_name: ${SSEERR_DB_CNTNR:-sseerr-db}
    ports:
      - "${SSEERR_DB_PORT:-5435}:5432/tcp"
    environment:
      <<: *postgres_env
      POSTGRES_DB: ${SSEERR_DB}
      POSTGRES_USER: ${SSEERR_DB_USER}
    healthcheck:
      <<: *postgres_health
      test: ["CMD-SHELL", "pg_isready -U ${SSEERR_DB_USER} -d ${SONARR_DB}"]
    volumes:
      - ${CNFG_DIR:-/home/administrator}/sseerr_db:/var/lib/postgresql/data

  pgadmin:
    <<: *arr
    container_name: ${PGADMIN_CNTNR:-pgadmin}
    image: dpage/pgadmin4:${PGADMIN_TAG:-latest}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      # PGADMIN_CONFIG_SERVER_MODE: false
      # PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: false
    volumes:
      - ${CNFG_DIR:-/home/administrator}/pgadmin/servers.json:/pgadmin4/servers.json
    depends_on:
      radarr_db:
        condition: service_healthy
      radarr_db_log:
        condition: service_healthy
      sonarr_db:
        condition: service_healthy
      sonarr_db_log:
        condition: service_healthy
      sseerr_db:
        condition: service_healthy

  qbittorrent:
    <<: *arr
    image: lscr.io/linuxserver/qbittorrent:${QBITTORRENT_TAG:-5.1.4}
    container_name: ${QBITTORRENT_CNTNR:-qbittorrent}
    restart: unless-stopped
    ports:
      - ${QB_WEBUI_PORT:-8080}:8080
      - ${QB_TCP_PORT:-6881}:6881
      - ${QB_UDP_PORT:-6881}:6881/udp
    environment:
      <<: *arr_env
      WEBUI_PORT: "8080"
      TORRENTING_PORT: "6881"
    volumes:
      - ${CNFG_DIR:-/home/administrator}/qbittorrent/config:/config
      - ${MNT_DIR:-/home/administrator/downloads}/torrents:/data/torrents
    deploy:
      resources:
        limits:
          memory: ${QB_MEMORY_LIMIT:-4096M}

  qui:
    <<: *arr
    image: ghcr.io/autobrr/qui:${QUI_TAG:-latest}
    container_name: ${QUI_CNTNR:-qui}
    ports:
      - ${QUI_PORT:-7476}:7476
    environment:
      <<: *arr_env
    volumes:
      - ${CNFG_DIR:-/home/administrator}/qui/config:/config
    depends_on:
      qbittorrent:
        condition: service_healthy

  flaresolverr:
    <<: *arr
    image: flaresolverr/flaresolverr:${FLARESOLVERR_TAG:-latest}
    container_name: ${FLARESOLVERR_CNTNR:-flaresolverr}
    ports:
      - ${FLARESOLVERR_PORT:-8191}:8191
    environment:
      LOG_LEVEL: ${FS_LOG_LEVEL:-info}
      LOG_HTML: ${FS_LOG_HTML:-false}
      CAPTCHA_SOLVER: ${FS_CAPTCHA_SOLVER:-none}
      TZ: ${TZ}
    volumes:
      - ${CNFG_DIR:-/home/administrator}/flaresolverr/config:/config

  prowlarr:
    <<: *arr
    image: lscr.io/linuxserver/prowlarr:${PROWLARR_TAG:-latest}
    container_name: ${PROWLARR_CNTNR:-prowlarr}
    restart: unless-stopped
    ports:
      - ${PROWLARR_PORT:-9696}:9696
    environment:
      <<: *arr_env
    volumes:
      - ${CNFG_DIR:-/home/administrator}/prowlarr/config:/config
    depends_on:
      flaresolverr:
        condition: service_healthy

  radarr:
    <<: *arr
    image: linuxserver/radarr:${RADARR_TAG:-latest}
    container_name: ${RADARR_CNTNR:-radarr}
    restart: unless-stopped
    ports:
      - ${RADARR_PORT:-7878}:7878
    environment:
      <<: *arr_env
    volumes:
      - ${CNFG_DIR:-/home/administrator}/radarr/config:/config
      - ${MNT_DIR:-/home/administrator/downloads}:/data
    depends_on:
      pgadmin:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy
      prowlarr:
        condition: service_healthy

  sonarr:
    <<: *arr
    image: linuxserver/sonarr:${SONARR_TAG:-latest}
    container_name: ${SONARR_CNTNR:-sonarr}
    ports:
      - ${SONARR_PORT:-8989}:8989
    environment:
      <<: *arr_env
    volumes:
      - ${CNFG_DIR:-/home/administrator}/sonarr/config:/config
      - ${MNT_DIR:-/home/administrator/downloads}:/data
    depends_on:
      pgadmin:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy
      prowlarr:
        condition: service_healthy

  seerr:
    <<: *arr
    image: ghcr.io/seerr-team/seerr:${SEERR_TAG:-latest}
    container_name: ${SEERR_CNTNR:-seerr}
    ports:
      - ${SEERR_PORT:-5055}:5055
    environment:
      LOG_LEVEL: ${SR_LOG_LEVEL:-debug}
      TZ: ${TZ}
      PORT: 5055
      DB_TYPE: ${SEERR_DB_TYPE:-postgres}
      DB_HOST: ${SEERR_DB_HOST:-localhost}
      DB_PORT: ${SEERR_DB_PORT:-localhost}
      DB_USER: ${SEERR_DB_USER:-localhost}
      DB_PASS: ${SEERR_DB_PASS:-localhost}
      DB_NAME: ${SSEERR_DB}
      DB_POOL_SIZE: "10"
      DB_LOG_QUERIES: "false"
    init: true
    volumes:
      - ${CNFG_DIR:-/home/administrator}/seerr/config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    depends_on:
      seerr_db:
        condition: service_healthy
      radarr:
        condition: service_healthy
      sonarr:
        condition: service_healthy

networks:
  servarr:
    external: true

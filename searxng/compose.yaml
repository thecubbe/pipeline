x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

x-health: &health
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

x-vpn: &vpn
  <<: *logging
  image: qmcgaw/gluetun:${VPN_TAG:-v3.41.1}
  cap_add:
    - NET_ADMIN
  restart: unless-stopped
  networks:
    - searxng
  environment: &vpn_env
    VPN_SERVICE_PROVIDER: protonvpn
    VPN_TYPE: wireguard
    UPDATER_PERIOD: 24h
    HEALTH_VPN_DURATION_INITIAL: ${HEALTH_VPN_DURATION_INITIAL:-30s}
    TZ: ${TZ}

services:
  vpn-xng:
    <<: *vpn
    container_name: ${VPN_CNTNR:-searxng-vpn}
    environment:
      <<: *vpn_env
      WIREGUARD_PRIVATE_KEY: ${WG_XNG_KEY}
      SERVER_COUNTRIES: ${VPN_XNG_COUNTRIES:-Austria}
      DNS_KEEP_NAMESERVER: "on"
      FIREWALL_OUTBOUND_SUBNETS: ${DOCKER_SUBNET:-172.22.0.0/16}
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    volumes:
      - ${CNFG_DIR:-/home/administrator}/searxng/vpn:/gluetun

  valkey:
    <<: *logging
    image: valkey/valkey:${VALKEY_TAG:-8-alpine}
    container_name: ${VALKEY_CNTNR:-searxng-valkey}
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    networks:
      - searxng
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    volumes:
      - ${CNFG_DIR:-/home/administrator}/searxng/valkey:/data
    healthcheck:
      <<: *health
      test: ["CMD", "valkey-cli", "ping"]

  searxng:
    <<: *logging
    image: searxng/searxng:${XNG_TAG:-2026.6.28-357662d86}
    container_name: ${XNG_CNTNR:-searxng}
    restart: unless-stopped
    network_mode: "service:vpn-xng"
    environment:
      SEARXNG_BASE_URL: https://${SEARXNG_HOSTNAME}/
      SEARXNG_VALKEY_URL: valkey://${VALKEY_CNTNR:-searxng-valkey}:6379/0
      GRANIAN_WORKERS: ${SEARXNG_WORKERS:-4}
      GRANIAN_BLOCKING_THREADS: ${SEARXNG_THREADS:-4}
    volumes:
      - ${CNFG_DIR:-/home/administrator}/searxng/data:/etc/searxng:rw
      - ${CNFG_DIR:-/home/administrator}/searxng/cache:/var/cache/searxng:rw
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    healthcheck:
      <<: *health
      test: ["CMD", "wget", "-q", "--spider", "--proxy=off", "http://localhost:8080/healthz"]
      start_period: 60s
    depends_on:
      vpn-xng:
        condition: service_healthy
        restart: true
      valkey:
        condition: service_healthy

networks:
  searxng:
    external: true
